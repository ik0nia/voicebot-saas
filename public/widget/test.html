<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Chat Widget - Sambla</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 40px; }
        h1 { color: #1e293b; }
        p { color: #64748b; }
    </style>
</head>
<body>
    <h1>Test Chat Widget</h1>
    <p>Widget-ul Sambla ar trebui să apară în colțul din dreapta jos.</p>
    <p>Testează cu: "aveti parchet vox?" sau "suruburi 3.5x55"</p>

    <script src="https://sambla.ro/widget/sambla-chat.js"
        data-channel-id="4"
        data-color="#991b1b"
        data-position="bottom-right"
        data-greeting="Bună! Cu ce te pot ajuta?"
        data-bot-name="Alex"
        data-api-base="https://sambla.ro"
        async defer></script>
</body>
</html>
