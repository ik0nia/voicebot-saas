<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sambla — Documentație Arhitectură</title>
    <meta name="robots" content="noindex, nofollow">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.7;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }
        h1 { color: #f0f6fc; font-size: 2em; margin-bottom: 8px; border-bottom: 1px solid #21262d; padding-bottom: 12px; }
        h2 { color: #58a6ff; font-size: 1.5em; margin-top: 48px; margin-bottom: 16px; border-bottom: 1px solid #21262d; padding-bottom: 8px; }
        h3 { color: #79c0ff; font-size: 1.2em; margin-top: 32px; margin-bottom: 12px; }
        h4 { color: #d2a8ff; font-size: 1.05em; margin-top: 24px; margin-bottom: 8px; }
        p { margin-bottom: 12px; }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        code {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 2px 6px;
            font-size: 0.88em;
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
            color: #e6edf3;
        }
        pre {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            margin: 12px 0 16px;
        }
        pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 0.85em;
            line-height: 1.5;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0 20px;
            font-size: 0.92em;
        }
        th {
            background: #161b22;
            color: #f0f6fc;
            text-align: left;
            padding: 10px 12px;
            border: 1px solid #30363d;
            font-weight: 600;
        }
        td {
            padding: 8px 12px;
            border: 1px solid #30363d;
        }
        tr:nth-child(even) { background: #0d1117; }
        tr:nth-child(odd) { background: #161b22; }
        strong { color: #f0f6fc; }
        hr { border: none; border-top: 1px solid #21262d; margin: 40px 0; }
        ul, ol { margin: 8px 0 16px 24px; }
        li { margin-bottom: 4px; }
        blockquote {
            border-left: 4px solid #58a6ff;
            padding: 8px 16px;
            margin: 12px 0;
            background: #161b22;
            border-radius: 0 6px 6px 0;
        }
        .header-bar {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 24px;
            text-align: center;
            font-size: 0.85em;
            color: #8b949e;
        }
        #content img { max-width: 100%; }
        @media (max-width: 640px) {
            .container { padding: 20px 16px 60px; }
            h1 { font-size: 1.5em; }
            h2 { font-size: 1.25em; }
            pre { padding: 12px; font-size: 0.8em; }
            table { font-size: 0.82em; }
        }
    </style>
</head>
<body>
    <div class="header-bar">
        Sambla.ro &mdash; Documentație internă &bull; Generat: 28 Martie 2026
    </div>
    <div class="container">
        <div id="content"></div>
    </div>
    <script>
        fetch('/docs-architecture.md')
            .then(r => r.text())
            .then(md => {
                marked.setOptions({
                    highlight: function(code, lang) {
                        if (lang && hljs.getLanguage(lang)) {
                            return hljs.highlight(code, { language: lang }).value;
                        }
                        return hljs.highlightAuto(code).value;
                    },
                    breaks: false,
                    gfm: true
                });
                document.getElementById('content').innerHTML = marked.parse(md);
            });
    </script>
</body>
</html>
