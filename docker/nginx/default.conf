server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 50M;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # X-Frame-Options for non-chatbot routes (chatbot iframe must be embeddable on customer sites)
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Widget JS — always revalidate so clients get updates immediately
    location /widget/ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        resolver 127.0.0.11 valid=30s;
        set $app_upstream app:9000;
        fastcgi_pass $app_upstream;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        include fastcgi_params;
        fastcgi_buffering off;
        # Security headers (no X-Frame-Options — chatbot iframe must be embeddable)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ANCPI cadastral viewer (static files + PHP)
    location /ancpi {
        alias /var/www/html/public/ancpi;
        index index.html;

        location ~ \.(geojson|json)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        location ~ ^/ancpi/(.+\.php)$ {
            alias /var/www/html/public/ancpi/$1;
            resolver 127.0.0.11 valid=30s;
            set $app_upstream app:9000;
            fastcgi_pass $app_upstream;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public/ancpi/$1;
            fastcgi_param HTTPS on;
            fastcgi_param HTTP_X_FORWARDED_PROTO https;
            fastcgi_buffering off;
        }
    }

    location /app {
        resolver 127.0.0.11 valid=30s;
        set $reverb_upstream http://reverb:8080;
        proxy_pass $reverb_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
