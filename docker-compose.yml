services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicebot-app
    restart: unless-stopped
    volumes:
      - app-storage:/var/www/html/storage
    env_file:
      - .env
    environment:
      TZ: Europe/Bucharest
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=false"
    networks:
      - voicebot
      - coolify

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: voicebot-nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - app-storage:/var/www/html/storage:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - voicebot

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicebot-queue
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - app-storage:/var/www/html/storage
    env_file:
      - .env
    environment:
      TZ: Europe/Bucharest
    depends_on:
      app:
        condition: service_started
    labels:
      - "traefik.enable=false"
    networks:
      - voicebot
      - coolify

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicebot-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - app-storage:/var/www/html/storage
    env_file:
      - .env
    environment:
      TZ: Europe/Bucharest
    depends_on:
      app:
        condition: service_started
    labels:
      - "traefik.enable=false"
    networks:
      - voicebot
      - coolify

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicebot-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    env_file:
      - .env
    environment:
      TZ: Europe/Bucharest
    depends_on:
      app:
        condition: service_started
    labels:
      - "traefik.enable=false"
    networks:
      - voicebot
      - coolify

volumes:
  app-storage:

networks:
  voicebot:
    driver: bridge
  coolify:
    external: true
